trigger:
  branches:
    include:
      - main

pool:
  name: SelfHostedWindowsPool

variables:
  azureServiceConnection: 'sc-azure-to-dev'
  resourceGroupName: 'Devops-Datta-RG'
  aksClusterName: 'AKS-cluster'
  acrName: 'Containeregistry123'
  acrLoginServer: 'containeregistry123.azurecr.io'
  imageTag: '$(Build.BuildId)'

stages:
- stage: Build
  displayName: Build images in ACR
  jobs:
  - job: BuildInACR
    steps:
    - checkout: self
    - task: AzureCLI@2
      displayName: Build frontend and backend in ACR
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr build --registry $(acrName) --image taskflow-frontend:$(imageTag) -f Dockerfile.frontend .
          az acr build --registry $(acrName) --image taskflow-backend:$(imageTag) -f Dockerfile.backend .

- stage: DeployDev
  displayName: Deploy to Dev
  dependsOn: Build
  jobs:
  - deployment: DeployToDev
    environment: 'aks-dev'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          - task: AzureCLI@2
            displayName: Get AKS credentials
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az aks get-credentials --resource-group $(resourceGroupName) --name $(aksClusterName) --overwrite-existing

          - powershell: |
              (Get-Content k8s\frontend-deployment-dev.yaml) -replace ':1', ':$(imageTag)' | Set-Content k8s\frontend-deployment-dev.rendered.yaml
              (Get-Content k8s\backend-deployment-dev.yaml) -replace ':1', ':$(imageTag)' | Set-Content k8s\backend-deployment-dev.rendered.yaml

              kubectl apply -f k8s\namespace-dev.yaml
              kubectl apply -f k8s\configmap-dev.yaml
              kubectl apply -f k8s\frontend-service-dev.yaml
              kubectl apply -f k8s\backend-service-dev.yaml
              kubectl apply -f k8s\frontend-deployment-dev.rendered.yaml
              kubectl apply -f k8s\backend-deployment-dev.rendered.yaml
              kubectl apply -f k8s\ingress-dev.yaml
            displayName: Deploy to dev

- stage: DeployProd
  displayName: Deploy to Prod
  dependsOn: DeployDev
  jobs:
  - deployment: DeployToProd
    environment: 'aks-prod'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          - task: AzureCLI@2
            displayName: Get AKS credentials
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az aks get-credentials --resource-group $(resourceGroupName) --name $(aksClusterName) --overwrite-existing

          - powershell: |
              (Get-Content k8s\frontend-deployment-prod.yaml) -replace ':1', ':$(imageTag)' | Set-Content k8s\frontend-deployment-prod.rendered.yaml
              (Get-Content k8s\backend-deployment-prod.yaml) -replace ':1', ':$(imageTag)' | Set-Content k8s\backend-deployment-prod.rendered.yaml

              kubectl apply -f k8s\namespace-prod.yaml
              kubectl apply -f k8s\configmap-prod.yaml
              kubectl apply -f k8s\frontend-service-prod.yaml
              kubectl apply -f k8s\backend-service-prod.yaml
              kubectl apply -f k8s\frontend-deployment-prod.rendered.yaml
              kubectl apply -f k8s\backend-deployment-prod.rendered.yaml
              kubectl apply -f k8s\ingress-prod.yaml
            displayName: Deploy to prod
